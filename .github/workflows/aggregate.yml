name: Rebuild aggregator
on:
  push:
    paths: ["manifests/**"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/aggregate.mjs
      - run: |
          git config user.name "writerslogic-registry-bot"
          git config user.email "bot@writerslogic.com"
          git add aggregator.json
          git diff --staged --quiet || (git commit -m "chore: rebuild aggregator [skip ci]" && git push)
